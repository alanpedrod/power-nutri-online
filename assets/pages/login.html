<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PowerNutri Admin</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">

  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="login-logo">
        <span class="logo-text">PowerNutri</span>
        <span class="logo-sub">Suplementos</span>
      </div>
      <p class="login-title">Acesso administrativo</p>
    </div>

    <!-- Mensagem de erro -->
    <div class="login-error" id="login-error"></div>

    <!-- Form -->
    <div class="login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">E-mail</label>
        <input class="form-input" type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Senha</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="btn-login">Entrar</button>

      <div class="login-divider"></div>

      <a href="/index.html" class="login-back">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Voltar para a loja
      </a>
    </div>
  </div>

  <!-- WhatsApp float -->
  <a href="https://wa.me/5582999999999" class="whatsapp-float" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.117.553 4.1 1.522 5.823L.057 23.743a.5.5 0 0 0 .618.627l6.086-1.463A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.862 0-3.61-.5-5.115-1.374l-.363-.216-3.745.9.916-3.65-.236-.375A9.957 9.957 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
    </svg>
  </a>

  <script type="module">
    import { auth, signInWithEmailAndPassword, onAuthStateChanged }
      from '../js/firebase-config.js';

    // Redirecionar se já logado
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = './admin.html';
    });

    document.getElementById('btn-login').addEventListener('click', async () => {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl  = document.getElementById('login-error');

      if (!email || !password) {
        errorEl.textContent = 'Preencha e-mail e senha.';
        errorEl.classList.add('visible');
        return;
      }

      document.getElementById('btn-login').textContent = 'Entrando...';
      document.getElementById('btn-login').disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = './admin.html';
      } catch (err) {
        const msgs = {
          'auth/user-not-found':  'E-mail não encontrado.',
          'auth/wrong-password':  'Senha incorreta.',
          'auth/invalid-email':   'E-mail inválido.',
          'auth/too-many-requests': 'Muitas tentativas. Tente mais tarde.',
        };
        errorEl.textContent = msgs[err.code] || 'Erro ao fazer login.';
        errorEl.classList.add('visible');
      } finally {
        document.getElementById('btn-login').textContent = 'Entrar';
        document.getElementById('btn-login').disabled = false;
      }
    });

    // Enter para logar
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });
  </script>
</body>
</html>
